<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocSend → PDF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    h1 { font-size: 1.4rem; color: #111; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #333; margin-bottom: 6px; }
    input[type="url"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .optional { color: #999; font-weight: 400; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.loading { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.error   { background: #fef2f2; color: #b91c1c; display: block; }
    .error-msg {
      background: #fef2f2;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #93c5fd;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>DocSend → PDF</h1>

    {% if not auth %}
      <p class="subtitle">Enter the access code to continue.</p>
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/">
        <label for="access_code">Access Code</label>
        <input type="password" id="access_code" name="access_code" required autofocus
               placeholder="Enter access code" />
        <button type="submit">Continue</button>
      </form>

    {% else %}
      <p class="subtitle">Paste a DocSend link to download it as a PDF.</p>
      <form id="form">
        <input type="hidden" name="access_code" value="{{ access_code }}" />

        <label for="url">DocSend URL</label>
        <input id="url" name="url" type="url" required
               placeholder="https://docsend.com/view/abc123xyz" />

        <label for="email">Email <span class="optional">(only needed for gated decks)</span></label>
        <input id="email" name="email" type="email"
               placeholder="you@company.com" />

        <label for="filename">File name <span class="optional">(optional — defaults to the deck's title)</span></label>
        <input id="filename" name="filename" type="text"
               placeholder="e.g. Acme Seed Deck" />

        <button type="submit" id="btn">Download PDF</button>
      </form>
      <div class="status" id="status"></div>

      <script>
        const form = document.getElementById("form");
        const btn  = document.getElementById("btn");
        const status = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          btn.disabled = true;
          btn.textContent = "Working…";
          status.className = "status loading";
          status.innerHTML = '<span class="spinner"></span>Capturing slides — this can take 1–2 minutes for large decks…';

          try {
            const res = await fetch("/scrape", { method: "POST", body: new FormData(form) });
            if (!res.ok) {
              const msg = await res.text();
              status.className = "status error";
              status.textContent = "Error: " + msg;
            } else {
              const blob = await res.blob();
              const name = res.headers.get("X-Download-Filename") || "deck.pdf";
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = name;
              a.click();
              status.className = "status loading";
              status.innerHTML = "Done! Downloaded as <strong>" + name + "</strong>.";
            }
          } catch (err) {
            status.className = "status error";
            status.textContent = "Request failed: " + err.message;
          } finally {
            btn.disabled = false;
            btn.textContent = "Download PDF";
          }
        });
      </script>
    {% endif %}
  </div>
</body>
</html>
